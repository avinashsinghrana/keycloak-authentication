server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/keycloak-anti
    username: postgres
    password: credable
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/microservice-realm
          jwk-set-uri: http://localhost:8080/realms/microservice-realm/protocol/openid-connect/certs

springdoc:
  pathsToExclude: /error

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  kafka:
    bootstrap-servers: auth-kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    template:
      default-topic: auth-events

keycloak:
  server-url: http://keycloak:8080
  realm: microservice-realm
  client-id: auth-service-client
  client-secret: "XGlVtEwXOtoKnlLdMj3JE4t1Kmhf8ZMK" # Replace with actual secret or use env var
  admin:
    username: admin
    password: admin

logging:
  level:
    org.springframework.security: DEBUG
    com.asr: DEBUG
    org.springframework.web: INFO
